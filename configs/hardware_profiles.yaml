# Normalization baseline (all results can be normalized to this)
normalization_baseline: a100_80gb

# Performance tier classification
tiers:
  enterprise:
    - h100_80gb
    - h100_sxm
    - a100_80gb
    - a100_40gb
  prosumer:
    - rtx_4090
    - rtx_3090
    - v100_32gb
    - v100_16gb
  consumer:
    - rtx_4080
    - rtx_3080

# Common multi-GPU configurations
multi_gpu_configs:
  2x_a100:
    gpus: [a100_80gb, a100_80gb]
    interconnect: nvlink
    total_memory_gb: 160
  4x_a100:
    gpus: [a100_80gb, a100_80gb, a100_80gb, a100_80gb]
    interconnect: nvlink
    total_memory_gb: 320
  8x_h100:
    gpus: [h100_sxm, h100_sxm, h100_sxm, h100_sxm, h100_sxm, h100_sxm, h100_sxm, h100_sxm]
    interconnect: nvlink
    total_memory_gb: 640
